<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catat Transaksi – SakuAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Inter', sans-serif;
    }

    /* ── Phone shell ── */
    .phone {
      width: 390px;
      min-height: 100vh;
      background: linear-gradient(180deg, #F7F9FB 0%, #F7F9FB 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top header ── */
    .header {
      position: fixed;
      top: 0;
      width: 390px;
      height: 64px;
      padding: 0 20px;
      background: #F7F9FB;
      box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 9999px;
      overflow: hidden;
      background: #ECEEF0;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand {
      color: #0050CB;
      font-size: 24px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      line-height: 32px;
    }

    .btn-notif {
      width: 40px;
      height: 40px;
      border-radius: 9999px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #424656;
    }

    .btn-notif:hover {
      background: #ECEEF0;
    }

    /* ── Scrollable content ── */
    .content {
      margin-top: 64px;
      margin-bottom: 80px;
      padding: 80px 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ── Page heading ── */
    .page-heading {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      text-align: center;
    }

    .page-heading h1 {
      color: #191C1E;
      font-size: 28px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      line-height: 36px;
    }

    .page-heading p {
      color: #424656;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
    }

    /* ── Input card ── */
    .input-card {
      background: rgba(255, 255, 255, 0.70);
      box-shadow: 0px 0px 20px rgba(0, 102, 255, 0.15);
      border-radius: 12px;
      outline: 1px solid rgba(255, 255, 255, 0.30);
      backdrop-filter: blur(6px);
      padding: 40px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .textarea-wrap {
      height: 128px;
      padding: 8px 12px;
      display: flex;
      align-items: flex-start;
    }

    .input-card textarea {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      resize: none;
      outline: none;
      color: #191C1E;
      font-size: 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      line-height: 28px;
    }

    .input-card textarea::placeholder {
      color: #B0B5C0;
      font-weight: 400;
    }

    /* ── Card bottom actions ── */
    .card-actions {
      padding-top: 16px;
      border-top: 1px solid #E0E3E5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-scan {
      padding: 8px 16px;
      background: #ECEEF0;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #424656;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      line-height: 16px;
      letter-spacing: 0.6px;
      transition: background 0.15s;
    }

    .btn-scan:hover {
      background: #D8DBE0;
    }

    .btn-mic {
      width: 64px;
      height: 64px;
      border-radius: 9999px;
      background: #0050CB;
      border: none;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0px 4px 6px -4px rgba(0, 0, 0, 0.10), 0px 10px 15px -3px rgba(0, 0, 0, 0.10);
      color: white;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .btn-mic:hover {
      background: #0040A8;
    }

    .btn-mic:active {
      transform: scale(0.95);
    }

    /* ── Bottom navigation ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 390px;
      height: 80px;
      padding: 0 18px 0 22px;
      background: white;
      box-shadow: 0px -4px 12px rgba(0, 102, 255, 0.08);
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 16px;
      border-radius: 9999px;
      text-decoration: none;
      gap: 0;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #424656;
      font-size: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      line-height: 15px;
      transition: background 0.15s;
    }

    .nav-item:hover:not(.nav-item--active) {
      background: #F0F2F5;
    }

    .nav-item--active {
      background: #0066FF;
      color: #F8F7FF;
      font-weight: 700;
    }

    .nav-icon {
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div class="phone">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-left">
        <div class="avatar">
          <img src="assets/img/user.jpg" alt="User" />
        </div>
        <span class="brand">SakuAI</span>
      </div>
      <button class="btn-notif" aria-label="Notifikasi">
        <!-- Bell icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22C13.1046 22 14 21.1046 14 20H10C10 21.1046 10.8954 22 12 22Z" fill="currentColor" />
          <path
            d="M18 16V11C18 7.93 16.36 5.36 13.5 4.68V4C13.5 3.17157 12.8284 2.5 12 2.5C11.1716 2.5 10.5 3.17157 10.5 4V4.68C7.63 5.36 6 7.92 6 11V16L4 18V19H20V18L18 16Z"
            fill="currentColor" />
        </svg>
      </button>
    </header>

    <!-- ── Main content ── -->
    <main class="content">

      <!-- Page heading -->
      <div class="page-heading">
        <h1>Catat Pintar</h1>
        <p>Ceritakan pengeluaranmu, AI yang akan mengurus<br />sisanya.</p>
      </div>

      <!-- Input card -->
      <div class="input-card">
        <div class="textarea-wrap">
          <textarea placeholder="Ceritakan transaksimu…">Tadi beli bakso 15 ribu</textarea>
        </div>

        <div class="card-actions">
          <!-- Scan Struk -->
          <button class="btn-scan" aria-label="Scan Struk">
            <!-- Camera icon -->
            <svg width="17" height="15" viewBox="0 0 24 21" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M9 2L7.17 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4H16.83L15 2H9ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9Z"
                fill="currentColor" />
            </svg>
            Scan Struk
          </button>

          <!-- Mic button -->
          <button class="btn-mic" aria-label="Rekam suara">
            <svg width="19" height="26" viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M12 2C10.3431 2 9 3.34315 9 5V16C9 17.6569 10.3431 19 12 19C13.6569 19 15 17.6569 15 16V5C15 3.34315 13.6569 2 12 2Z"
                fill="white" />
              <path d="M5 13C5 13 5 20 12 20C19 20 19 13 19 13" stroke="white" stroke-width="2"
                stroke-linecap="round" />
              <line x1="12" y1="20" x2="12" y2="25" stroke="white" stroke-width="2" stroke-linecap="round" />
              <line x1="9" y1="25" x2="15" y2="25" stroke="white" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </div>

    </main>

    <!-- ── Bottom navigation ── -->
    <nav class="bottom-nav">
      <!-- Beranda -->
      <a class="nav-item" href="index.html">
        <span class="nav-icon">
          <svg width="15" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 20V14H14V20H19V12H22L12 3L2 12H5V20H10Z" fill="currentColor" />
          </svg>
        </span>
        Beranda
      </a>

      <!-- Riwayat -->
      <a class="nav-item" href="riwayat.html">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M13 3C8.03 3 4 7.03 4 12H1L4.89 15.89L4.96 16.03L9 12H6C6 8.13 9.13 5 13 5C16.87 5 20 8.13 20 12C20 15.87 16.87 19 13 19C11.07 19 9.32 18.21 8.06 16.94L6.64 18.36C8.27 19.99 10.51 21 13 21C17.97 21 22 16.97 22 12C22 7.03 17.97 3 13 3ZM12 8V13L16.28 15.54L17 14.33L13.5 12.25V8H12Z"
              fill="currentColor" />
          </svg>
        </span>
        Riwayat
      </a>

      <!-- AI Catat (active) -->
      <a class="nav-item nav-item--active" href="catat-transaksi.html">
        <span class="nav-icon">
          <svg width="14" height="19" viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C10.3431 2 9 3.34315 9 5V16C9 17.6569 10.3431 19 12 19C13.6569 19 15 17.6569 15 16V5C15 3.34315 13.6569 2 12 2Z"
              fill="currentColor" />
            <path d="M5 13C5 13 5 20 12 20C19 20 19 13 19 13" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" />
            <line x1="12" y1="20" x2="12" y2="25" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            <line x1="9" y1="25" x2="15" y2="25" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
          </svg>
        </span>
        AI Catat
      </a>

      <!-- Anggaran -->
      <a class="nav-item" href="anggaran.html">
        <span class="nav-icon">
          <svg width="19" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M21 18V19C21 20.1 20.1 21 19 21H5C3.89 21 3 20.1 3 19V5C3 3.9 3.89 3 5 3H19C20.1 3 21 3.9 21 5V6H12C10.89 6 10 6.9 10 8V16C10 17.1 10.89 18 12 18H21ZM12 16H22V8H12V16ZM16 13.5C15.17 13.5 14.5 12.83 14.5 12C14.5 11.17 15.17 10.5 16 10.5C16.83 10.5 17.5 11.17 17.5 12C17.5 12.83 16.83 13.5 16 13.5Z"
              fill="currentColor" />
          </svg>
        </span>
        Anggaran
      </a>
    </nav>

  </div>
</body>

</html>
